<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ICBM2 Intelligence Hub</title>
    <link rel="stylesheet" href="/static/css/style.css">

</head>
<body>

    <!-- ─── Header ──────────────────────────────────────────────────────── -->
    <header class="header">
        <div class="header-inner">
            <div class="header-title">
                <span class="header-icon">🚀</span>
                <span class="header-text">ICBM2 Intelligence Hub</span>
            </div>
            <div class="header-badge" id="lastUpdated"></div>
        </div>
    </header>

    <!-- ─── Tab Navigation ──────────────────────────────────────────────── -->
    <nav class="tab-nav" id="tabNav">
        <button class="tab-btn active" data-tab="models" aria-label="AI 모델 트래커">
            <span class="tab-icon">🤖</span>
            <span class="tab-label">AI 모델</span>
        </button>
        <button class="tab-btn" data-tab="ios" aria-label="iOS 트렌드">
            <span class="tab-icon">📱</span>
            <span class="tab-label">iOS</span>
        </button>
        <button class="tab-btn" data-tab="learning" aria-label="학습 로그">
            <span class="tab-icon">📚</span>
            <span class="tab-label">학습</span>
        </button>
        <button class="tab-btn" data-tab="trending" aria-label="GitHub 트렌딩">
            <span class="tab-icon">🔥</span>
            <span class="tab-label">GitHub</span>
        </button>
    </nav>

    <!-- ─── Main Content ────────────────────────────────────────────────── -->
    <main class="main-content" id="mainContent">

        <!-- Section: AI Models -->
        <section class="tab-panel active" id="panel-models">
            <div class="section-header">
                <h2 class="section-title">🤖 AI 모델 트래커</h2>
                <span class="badge badge-source">Notion</span>
            </div>
            <div id="modelsLoading" class="spinner-wrapper">
                <div class="spinner"></div>
                <span>AI 모델 데이터를 불러오는 중...</span>
            </div>
            <div id="modelsContent" class="card-list" style="display:none;"></div>
            <div id="modelsError" class="error-state" style="display:none;">
                <div class="error-icon">⚠️</div>
                <div class="error-message">AI 모델 데이터를 불러올 수 없습니다</div>
                <button class="retry-btn" onclick="retrySection('models')">다시 시도</button>
            </div>
        </section>

        <!-- Section: iOS Trends -->
        <section class="tab-panel" id="panel-ios">
            <div class="section-header">
                <h2 class="section-title">📱 iOS 트렌드</h2>
                <span class="badge badge-source">Notion</span>
            </div>
            <div id="iosLoading" class="spinner-wrapper">
                <div class="spinner"></div>
                <span>iOS 트렌드를 불러오는 중...</span>
            </div>
            <div id="iosContent" class="card-list" style="display:none;"></div>
            <div id="iosError" class="error-state" style="display:none;">
                <div class="error-icon">⚠️</div>
                <div class="error-message">iOS 트렌드를 불러올 수 없습니다</div>
                <button class="retry-btn" onclick="retrySection('ios')">다시 시도</button>
            </div>
        </section>

        <!-- Section: Learning -->
        <section class="tab-panel" id="panel-learning">
            <div class="section-header">
                <h2 class="section-title">📚 학습 로그</h2>
                <span class="badge badge-source">Notion</span>
            </div>
            <div id="learningLoading" class="spinner-wrapper">
                <div class="spinner"></div>
                <span>학습 로그를 불러오는 중...</span>
            </div>
            <div id="learningContent" class="card-list" style="display:none;"></div>
            <div id="learningError" class="error-state" style="display:none;">
                <div class="error-icon">⚠️</div>
                <div class="error-message">학습 로그를 불러올 수 없습니다</div>
                <button class="retry-btn" onclick="retrySection('learning')">다시 시도</button>
            </div>
        </section>

        <!-- Section: GitHub Trending -->
        <section class="tab-panel" id="panel-trending">
            <div class="section-header">
                <h2 class="section-title">🔥 GitHub 트렌딩</h2>
                <span class="badge badge-trending">오늘의 인기</span>
            </div>
            <div id="trendingLoading" class="spinner-wrapper">
                <div class="spinner"></div>
                <span>트렌딩 리포지토리를 불러오는 중...</span>
            </div>
            <div id="trendingContent" class="card-list" style="display:none;"></div>
            <div id="trendingError" class="error-state" style="display:none;">
                <div class="error-icon">⚠️</div>
                <div class="error-message">트렌딩 데이터를 불러올 수 없습니다</div>
                <button class="retry-btn" onclick="retrySection('trending')">다시 시도</button>
            </div>
        </section>

    </main>

    <script src="/static/js/charts.js"></script>
</body>
</html>
